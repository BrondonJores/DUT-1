<!DOCTYPE html>
<html>
<head>
    <title>Ma premiere page web</title>
</head>
<body background="./images/representation.jpg" style="background-repeat: no-repeat; background-size: cover;">

    <p style="color: transparent; text-align: center; font-size: 45px; font-weight: bold; -webkit-text-stroke: 1.8px #fff;">Bienvenue sur la page du formulaire professionnel</p>
    <form action="#">
        <fieldset>
            
            
            <legend style="color: white; font-size: 20px; font-weight: bold; ">INFORMATIONS PERSONNELLES</legend>
            <div class="contain">
                <label for="Name" class="textelabel">Nom :</label> &nbsp;
                <label for="#"><input type="text" class="texteinput"></label><br>

                <label for="Name" class="textelabel">Prenom :</label> &nbsp;
                <label for="#"><input type="text" class="texteinput"></label><br>

                <label for="Name" class="textelabel">Profession :</label> &nbsp;
                <label for="#"><input type="text" class="texteinput"></label><br>

                <label for="Name" class="textelabel">Sexe :</label> &nbsp;
                <label for="#" style="color: #fff;"><input type="radio" name="sexe" id="#" value="Masculin" checked > Masculin &nbsp; <input type="radio" name="sexe" id="#" value="Feminin"> Feminin</label><br>
                
                <label for="Name" class="textelabel">Commentaire :</label> &nbsp;
                <label for="#" style="color: #fff;"><textarea name="texte" id="" cols="100" rows="5"></textarea></label> <br>

                <label for="Name" class="textebtn"> <input type="submit" value="Envoyer"></label> &nbsp;
                <label for="#" class="textebtn"> <input type="reset" value="Annuler"> </label> <br>
                

            </div>            
        </fieldset>
    </form>

</body>
</html>

<style>
    *{
        overflow-x: hidden;
    }
    .texteinput{
        width: 80%; 
        margin-bottom: 10px;
        background: none;
        border-left: 0px !important ;
        color: #fff;
    }
    .textelabel{
        color: white;
        font-size: 15px;
    }
    .contain{ 
        display: block;
        justify-content: space-between;
    }
    textarea{
        width: 100%;
    }
    .textebtn{
        height: 100px;
        width: 100px;
    }
    

</style>
