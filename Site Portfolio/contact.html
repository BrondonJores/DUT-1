<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Houakeu Brondon Portfolio</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="shortcut icon" href="images/Young_programs-removebg-preview.png" type="image/x-icon">
     <!--Icones section -->
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
</head>
<body>
    
    <!--header section -->
    <header class="header">
        <a href="#" class="logo">Houakeu.</a>

        <div class='bx bx-menu' id="menu-icon"></div>
       
        <nav class="navbar">
            <a href="index.html" target="_blank" class="active">Accueil</a>
            <a href="Apropos.html" target="_blank">A propos</a>
            <a href="Education.html" target="_blank">Education</a>
            <a href="Attestation.html" target="_blank">Attestation</a>
            <a href="competences.html" target="_blank">Compétences</a>
            <a href="contact.html" target="_blank">Contact</a>

            <span class="active-nav"></span>
        </nav>
    </header>

    <!-- Contact section -->

    <section class="contact" id="Contact" name="Contact">
        <h2 class="heading"> Contactez <span>Moi !</span></h2>

        <form action="#">
            <div class="input-box">
                <div class="input-field">
                    <input type="text" placeholder="Votre Nom" required>
                    <span class="focus"></span>
                </div>

                <div class="input-field">
                    <input type="email" placeholder="Votre Adresse Email@email.___" required>
                    <span class="focus"></span>
                </div>
            </div>

            <div class="input-box">
                <div class="input-field">
                    <input type="number" placeholder="Votre Numéro de télephone" min="9" required>
                    <span class="focus"></span>
                </div>

                <div class="input-field">
                    <input type="text" placeholder="Objet de l'email" required>
                    <span class="focus"></span>
                </div>
            </div>

           <div class="textarea-field">
                <textarea name="" id="" cols="30" rows="10" placeholder="Votre Méssage" required></textarea>
                <span class="focus"></span>
           </div>

           <div class="btn-box btns">
                <button type="submit" class="btn">Envoyer</button>
           </div>

        </form>
    </section>

    <!-- Footer section -->
    <footer class="footer">
        <div class="footer-text">
            <p>Copyright &copy; 2024 Par Houakeu Kamguia Brondon Jores | Tout droits réservés.</p>
        </div>

        <div class="footer-iconTop">
            <a href="#"><i class="bx bx-up-arrow-alt"></i></a>
        </div>
    </footer>
    <script src="js/script.js"></script>
</body>
</html>
